<ion-grid>
  <ion-row>
    <ion-col
      size="12"
      sizeMd="6"
      sizeLg="4"
      sizeXl="4"
      *ngFor="let item of skeletonItems"
    >
      <ion-card class="skeleton-card">
        <!-- Year label skeleton -->
        <div class="top-label">
          <ion-skeleton-text [animated]="true" style="width: 100%; height: 100%;"></ion-skeleton-text>
        </div>

        <!-- Footer skeleton -->
        <div class="footer-container">
          <div class="ribbon"></div>
        </div>
      </ion-card>
    </ion-col>
  </ion-row>
</ion-grid>
